<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCOUNDREL // SOLO ENGINE</title>
<link rel="stylesheet" href="fonts.css">
<style>
  :root{
    --bg:#050402;
    --panel:#0c0906;
    --panel-2:#100c08;
    --amber:#ffb300;
    --amber-dim:#8a5f00;
    --amber-glow: rgba(255,179,0,0.55);
    --red:#ff5a4d;
    --red-dim:#7a2b24;
    --white:#e9e3d2;
    --ok:#8fffa0;
    --font-d:'VT323', monospace;
    --font-b:'Share Tech Mono','Courier New', monospace;

    --card-red:#ff5555;
    --card-cyan:#55ffff;
    --card-green:#55ff55;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;padding:0;}
  body{
    min-height:100vh;
    background:radial-gradient(ellipse at 50% 0%, #0a0704 0%, var(--bg) 60%);
    color:var(--amber);
    font-family:var(--font-b);
    display:flex;
    justify-content:center;
    padding:20px 10px 60px;
    position:relative;
    overflow-x:hidden;
  }

  /* CRT scanlines + flicker, matching the launcher/Regicide theme */
  .crt::before{
    content:"";
    position:fixed; inset:0;
    background:repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 1px,
      rgba(0,0,0,0.18) 2px,
      rgba(0,0,0,0.18) 3px
    );
    pointer-events:none;
    z-index:200;
    mix-blend-mode:multiply;
    animation:flicker 6s infinite;
  }
  .crt::after{
    content:"";
    position:fixed; inset:0;
    background:radial-gradient(ellipse at center, rgba(0,0,0,0) 60%, rgba(0,0,0,0.55) 100%);
    pointer-events:none;
    z-index:201;
  }
  @keyframes flicker{
    0%,100%{opacity:1;}
    92%{opacity:1;}
    93%{opacity:0.85;}
    94%{opacity:1;}
  }

  .terminal{
    width:100%;
    max-width:760px;
    border:1px solid var(--amber-dim);
    background:var(--panel);
    box-shadow:0 0 40px rgba(255,179,0,0.08), inset 0 0 60px rgba(0,0,0,0.6);
    display:flex;
    flex-direction:column;
  }
  .titlebar{
    display:flex;
    align-items:center;
    gap:10px;
    padding:8px 14px;
    background:linear-gradient(180deg, #171006, #0c0805);
    border-bottom:1px solid var(--amber-dim);
    font-family:var(--font-d);
    font-size:20px;
    letter-spacing:2px;
    color:var(--amber);
  }
  .dots{display:flex;gap:6px;margin-left:auto;}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--amber-dim);}

  .screen{
    padding:20px 22px 16px;
  }

  .wrap{width:100%;}

  .logo-wrap{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
    text-align:center;
    margin-bottom:20px;
  }
  .logo{
    font-family:'Press Start 2P', var(--font-d);
    font-size:clamp(18px,5vw,28px);
    letter-spacing:3px;
    color:var(--amber);
    text-shadow:
      2px 2px 0 #7a4600,
      3px 3px 0 #7a4600,
      0 0 10px var(--amber-glow),
      0 0 22px var(--amber-glow);
    line-height:1.3;
  }
  .logo-sub{
    font-family:var(--font-b);
    font-size:11px;
    letter-spacing:4px;
    color:var(--amber-dim);
    text-transform:uppercase;
  }
  .blink{animation:blink 1s steps(1) infinite;}
  @keyframes blink{50%{opacity:0;}}

  .dos-panel{
    background:var(--panel-2);
    border:1px solid var(--amber-dim);
    padding:14px 16px;
    margin-bottom:16px;
  }
  .panel-title{
    font-family:var(--font-b);
    font-size:11px;
    color:var(--amber-dim);
    letter-spacing:2px;
    text-transform:uppercase;
    margin:0 0 12px;
  }

  .statbar{
    display:flex;
    align-items:center;
    gap:18px;
    flex-wrap:wrap;
    font-size:19px;
  }
  .hp-row{display:flex;align-items:center;gap:10px;flex:1;min-width:220px;}
  .hp-label{color:var(--amber-dim);letter-spacing:1px;font-size:13px;font-family:var(--font-b);text-transform:uppercase;}
  .hp-track{
    flex:1;
    display:flex;
    gap:2px;
    height:18px;
    background:#000;
    border:1px solid var(--amber-dim);
    padding:2px;
  }
  .hp-block{flex:1;background:#1a1206;}
  .hp-block.filled{background:var(--amber);box-shadow:0 0 6px var(--amber-glow);}
  .hp-block.filled.ok{background:var(--ok);box-shadow:0 0 6px rgba(143,255,160,0.5);}
  .hp-num{
    color:var(--white);
    min-width:70px;
    text-align:right;
    font-size:20px;
    font-family:var(--font-d);
  }
  .mini-stats{
    display:flex;
    gap:18px;
    font-size:13px;
    font-family:var(--font-b);
    color:var(--amber-dim);
    letter-spacing:1px;
  }
  .mini-stats b{color:var(--amber);font-family:var(--font-d);font-size:16px;}

  .weapon-zone{
    display:flex;
    align-items:center;
    gap:8px;
    min-height:80px;
    margin-bottom:14px;
    padding-bottom:10px;
    border-bottom:1px dashed var(--amber-dim);
    flex-wrap:wrap;
  }
  .weapon-zone-label{
    font-size:11px;
    font-family:var(--font-b);
    color:var(--amber-dim);
    letter-spacing:1px;
    text-transform:uppercase;
    width:80px;
    flex-shrink:0;
  }
  .weapon-stack{display:flex;gap:6px;flex-wrap:wrap;}
  .empty-note{color:var(--amber-dim);font-size:13px;font-family:var(--font-b);}
  .empty-note::before{content:"[ ";}
  .empty-note::after{content:" ]";}

  .room-label{
    font-size:11px;
    font-family:var(--font-b);
    color:var(--amber-dim);
    letter-spacing:1px;
    text-transform:uppercase;
    margin-bottom:10px;
  }
  .room{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    min-height:90px;
    align-items:center;
  }

  /* CARD: compact rank+suit only — coloring by suit preserved */
  .card{
    width:64px;
    height:64px;
    background:#000;
    border:1.5px solid var(--amber-dim);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-family:'Press Start 2P', monospace;
    font-size:15px;
    line-height:1.4;
    cursor:pointer;
    position:relative;
    user-select:none;
    transition:transform .08s ease, border-color .08s ease, box-shadow .08s ease;
  }
  .card:hover{transform:translateY(-3px);}
  .card.selected{border-color:var(--white);box-shadow:0 0 10px var(--amber-glow);transform:translateY(-5px);}
  .card.disabled{cursor:default;opacity:.5;}
  .card.disabled:hover{transform:none;}
  .card.monster{color:var(--card-red);border-color:var(--card-red);}
  .card.weapon{color:var(--card-cyan);border-color:var(--card-cyan);}
  .card.potion{color:var(--card-green);border-color:var(--card-green);}
  .card .val{font-size:16px;}
  .card .sym{font-size:20px;font-family:Arial,'Segoe UI Symbol','DejaVu Sans',sans-serif;}

  .card-tag{
    position:absolute;
    top:-11px;left:50%;
    transform:translateX(-50%);
    font-family:var(--font-b);
    font-size:10px;
    background:var(--amber);
    color:#000;
    padding:0 5px;
    letter-spacing:1px;
    white-space:nowrap;
  }

  .actions{
    margin-top:16px;
    display:flex;
    gap:10px;
    justify-content:flex-start;
    flex-wrap:wrap;
    align-items:center;
    min-height:40px;
  }
  button{
    font-family:var(--font-b);
    font-size:13px;
    letter-spacing:1px;
    padding:9px 16px;
    background:#000;
    color:var(--amber);
    border:1px solid var(--amber);
    cursor:pointer;
    transition:background .1s, color .1s, box-shadow .1s;
  }
  button:hover:not(:disabled){background:var(--amber);color:#000;box-shadow:0 0 12px var(--amber-glow);}
  button:disabled{opacity:.3;cursor:not-allowed;}
  button.primary{color:var(--ok);border-color:var(--ok);}
  button.primary:hover:not(:disabled){background:var(--ok);color:#000;box-shadow:0 0 12px rgba(143,255,160,0.5);}
  button.flee{color:var(--amber-dim);border-color:var(--amber-dim);}
  button.flee:hover:not(:disabled){background:var(--amber-dim);color:#000;}

  .hint{
    color:var(--amber-dim);
    font-size:13px;
    font-family:var(--font-b);
    margin:0;
  }
  .hint::before{content:"> ";color:var(--amber);}

  .log{
    background:#000;
    border:1px solid var(--amber-dim);
    padding:10px 12px;
    height:150px;
    overflow-y:auto;
    font-size:13px;
    font-family:var(--font-b);
    line-height:1.5;
    color:var(--amber-dim);
  }
  .log p{margin:0 0 3px;}
  .log p::before{content:"> ";color:var(--amber);}
  .log p:last-child{color:var(--white);}

  .footer-row{
    display:flex;
    justify-content:center;
    margin-top:14px;
  }

  .overlay{
    position:fixed;inset:0;
    background:rgba(0,0,0,0.85);
    display:flex;align-items:center;justify-content:center;
    z-index:300;
    padding:20px;
  }
  .overlay.hidden{display:none;}
  .modal{
    background:var(--panel);
    border:1px solid var(--amber-dim);
    box-shadow:0 0 40px rgba(255,179,0,0.15), inset 0 0 40px rgba(0,0,0,0.6);
    padding:30px 26px;
    text-align:center;
    max-width:380px;
  }
  .modal h2{
    font-family:'Press Start 2P', monospace;
    font-size:16px;
    margin:0 0 14px;
    color:var(--amber);
    letter-spacing:1px;
    text-shadow:0 0 10px var(--amber-glow);
  }
  .modal .score{
    font-family:'Press Start 2P', monospace;
    font-size:34px;
    margin:16px 0;
    color:var(--white);
  }
  .modal p{color:var(--amber-dim);margin:0 0 20px;font-size:14px;font-family:var(--font-b);}

  @media (max-width:480px){
    .card{width:54px;height:54px;font-size:13px;}
    .weapon-zone-label{width:60px;font-size:12px;}
  }

  /* Readability: bolder text overall */
  body, button, input, select {
    font-weight: 700;
  }
  body, button, input, select,
  .log, .log *, .hint, .muted, .sublabel, .footer-hint, .card, .card *,
  .panel-title, .hp-num, .mini-stats, .weapon-zone-label, .room-label,
  .statusbar, .enemy-name, .barline, .bar, .combo-info, .hand-label,
  .logo-sub, .titlebar, .empty-note, .modal p, .switcher button,
  .stat-line, details.help, .log-label {
    text-shadow: 0.35px 0 0 currentColor, -0.35px 0 0 currentColor;
  }
</style>
</head>
<body class="crt">
<div class="terminal">
  <div class="titlebar">
    C:\APPS\SCOUNDREL
    <div class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
  </div>
  <div class="screen">
  <div class="wrap">
  <div class="logo-wrap">
    <div class="logo">SCOUNDREL</div>
    <div class="logo-sub">DUNGEON CRAWL SOLITAIRE // V1.0<span class="blink">_</span></div>
  </div>

  <div class="dos-panel">
    <div class="panel-title">STATUS</div>
    <div class="statbar">
      <div class="hp-row">
        <span class="hp-label">HP:</span>
        <div class="hp-track" id="hpTrack"></div>
        <span class="hp-num" id="hpNum">20/20</span>
      </div>
      <div class="mini-stats">
        <span>ROOM <b id="roomNum">1</b></span>
        <span>DECK <b id="deckCount">44</b></span>
        <span>DISCARD <b id="discardCount">0</b></span>
      </div>
    </div>
  </div>

  <div class="dos-panel">
    <div class="panel-title">DUNGEON</div>

    <div class="weapon-zone">
      <div class="weapon-zone-label">WEAPON:</div>
      <div class="weapon-stack" id="weaponStack"></div>
      <div class="empty-note" id="weaponEmptyNote">FISTS ONLY</div>
    </div>

    <div class="room-label">ROOM CONTENTS:</div>
    <div class="room" id="room"></div>

    <div class="actions" id="actions"></div>
  </div>

  <div class="dos-panel">
    <div class="panel-title">LOG</div>
    <div class="log" id="log"></div>
  </div>

  <div class="footer-row">
    <button id="restartBtn">NEW GAME</button>
  </div>
</div>
  </div>
</div>

<div class="overlay hidden" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">YOU HAVE FALLEN</h2>
    <div class="score" id="modalScore">0</div>
    <p id="modalDesc">The dungeon claims another scoundrel.</p>
    <button class="primary" id="modalRestart">RUN AGAIN</button>
  </div>
</div>

<script>
(function(){
  const SUITS = {
    clubs:{symbol:'♣', type:'monster'},
    spades:{symbol:'♠', type:'monster'},
    diamonds:{symbol:'♦', type:'weapon'},
    hearts:{symbol:'♥', type:'potion'}
  };
  const RANK_NAMES = {11:'J',12:'Q',13:'K',14:'A'};

  let deck, room, weapon, weaponStack, discard, hp, maxHp, roomNum,
      fledLastRoom, roomStarted, potionUsedThisRoom, gameOver,
      lastCard, selectedIdx;

  function rankLabel(v){ return RANK_NAMES[v] || String(v); }

  function makeDeck(){
    const cards = [];
    ['clubs','spades'].forEach(s=>{
      for(let v=2; v<=14; v++) cards.push({suit:s, value:v});
    });
    ['diamonds','hearts'].forEach(s=>{
      for(let v=2; v<=10; v++) cards.push({suit:s, value:v});
    });
    for(let i=cards.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [cards[i],cards[j]] = [cards[j],cards[i]];
    }
    return cards;
  }

  function log(msg){
    const el = document.getElementById('log');
    const p = document.createElement('p');
    p.textContent = msg;
    el.appendChild(p);
    el.scrollTop = el.scrollHeight;
  }

  function clearLog(){ document.getElementById('log').innerHTML=''; }

  function startGame(){
    deck = makeDeck();
    room = [];
    weapon = null;
    weaponStack = [];
    discard = [];
    hp = 20; maxHp = 20;
    roomNum = 1;
    fledLastRoom = false;
    roomStarted = false;
    potionUsedThisRoom = false;
    gameOver = false;
    lastCard = null;
    selectedIdx = null;
    clearLog();
    log('DESCENDING... HP 20. NO WEAPON EQUIPPED.');
    fillRoom();
    render();
  }

  function fillRoom(){
    while(room.length < 4 && deck.length > 0){
      room.push(deck.shift());
    }
  }

  function requiredRemaining(){
    return deck.length === 0 ? 0 : 1;
  }

  function canUseWeapon(monsterValue){
    if(!weapon) return false;
    if(weaponStack.length === 0) return true;
    return monsterValue <= weaponStack[weaponStack.length-1].value;
  }

  function afterResolve(){
    roomStarted = true;
    const req = requiredRemaining();
    if(room.length > req){
      render();
      return;
    }
    if(req === 0 && room.length === 0){
      winGame();
      return;
    }
    if(req === 1 && room.length === 1){
      roomNum++;
      fledLastRoom = false;
      roomStarted = false;
      potionUsedThisRoom = false;
      fillRoom();
      log('--- NEW ROOM LOADED ---');
    }
    render();
  }

  function resolveWeapon(idx){
    const card = room.splice(idx,1)[0];
    if(weapon){
      discard.push(weapon, ...weaponStack);
    }
    weapon = card;
    weaponStack = [];
    lastCard = card;
    log(`WEAPON EQUIPPED: ${rankLabel(card.value)}${SUITS[card.suit].symbol} (POWER ${card.value})`);
    selectedIdx = null;
    afterResolve();
  }

  function resolvePotion(idx){
    const card = room.splice(idx,1)[0];
    discard.push(card);
    lastCard = card;
    if(!potionUsedThisRoom){
      const before = hp;
      hp = Math.min(maxHp, hp + card.value);
      potionUsedThisRoom = true;
      log(`POTION CONSUMED (+${card.value}). HP ${before} -> ${hp}`);
    } else {
      log(`POTION IGNORED: LIMIT 1 PER ROOM.`);
    }
    selectedIdx = null;
    afterResolve();
  }

  function resolveMonster(idx, useWeapon){
    const card = room.splice(idx,1)[0];
    lastCard = card;
    const name = `${rankLabel(card.value)}${SUITS[card.suit].symbol}`;
    if(useWeapon){
      const dmg = Math.max(0, card.value - weapon.value);
      weaponStack.push(card);
      hp -= dmg;
      log(`ATTACK ${name} WITH WEAPON. DAMAGE TAKEN: ${dmg}`);
    } else {
      discard.push(card);
      hp -= card.value;
      log(`FIGHT ${name} BAREHANDED. DAMAGE TAKEN: ${card.value}`);
    }
    selectedIdx = null;
    if(hp <= 0){
      hp = 0;
      render();
      loseGame();
      return;
    }
    afterResolve();
  }

  function fleeRoom(){
    if(fledLastRoom || roomStarted || room.length===0) return;
    for(let i=room.length-1;i>=0;i--) deck.push(room[i]);
    room = [];
    fledLastRoom = true;
    log('FLED ROOM. CARDS SHUFFLED TO BOTTOM OF DECK.');
    fillRoom();
    render();
  }

  function winGame(){
    gameOver = true;
    let score = hp;
    let desc = `DUNGEON CLEARED WITH ${hp} HP REMAINING.`;
    if(hp === maxHp && lastCard && lastCard.suit==='hearts'){
      score = hp + lastCard.value;
      desc = `CLEARED AT FULL HP. BONUS POTION +${lastCard.value} PTS.`;
    }
    log(`YOU ESCAPE THE DUNGEON. FINAL SCORE: ${score}`);
    showModal('DUNGEON CLEARED', score, desc, true);
  }

  function loseGame(){
    gameOver = true;
    const remaining = [...deck, ...room].filter(c => SUITS[c.suit].type==='monster');
    const total = remaining.reduce((s,c)=>s+c.value,0);
    const score = -total;
    log(`YOU HAVE DIED. ${remaining.length} MONSTERS REMAINED (${total} PWR). SCORE: ${score}`);
    showModal('YOU HAVE FALLEN', score, `${remaining.length} MONSTER(S) LEFT BELOW, TOTALING ${total} STRENGTH.`, false);
  }

  function showModal(title, score, desc, won){
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalScore').textContent = (score>0?'+':'') + score;
    document.getElementById('modalScore').style.color = won ? 'var(--green)' : 'var(--white)';
    document.getElementById('modalDesc').textContent = desc;
    document.getElementById('overlay').classList.remove('hidden');
  }

  function cardEl(card, opts){
    opts = opts||{};
    const type = SUITS[card.suit].type;
    const div = document.createElement('div');
    div.className = 'card ' + type + (opts.selected?' selected':'') + (opts.disabled?' disabled':'');
    div.innerHTML = `<span class="val">${rankLabel(card.value)}</span><span class="sym">${SUITS[card.suit].symbol}</span>`;
    if(opts.tag){
      const tag = document.createElement('div');
      tag.className='card-tag';
      tag.textContent = opts.tag;
      div.appendChild(tag);
    }
    if(opts.onClick) div.addEventListener('click', opts.onClick);
    return div;
  }

  function renderHpTrack(){
    const track = document.getElementById('hpTrack');
    track.innerHTML = '';
    const totalBlocks = 20;
    const filled = Math.round((hp/maxHp)*totalBlocks);
    for(let i=0;i<totalBlocks;i++){
      const b = document.createElement('div');
      b.className = 'hp-block' + (i<filled ? (' filled'+(hp>maxHp*0.3?' ok':'')) : '');
      track.appendChild(b);
    }
  }

  function render(){
    renderHpTrack();
    document.getElementById('hpNum').textContent = `${hp}/${maxHp}`;
    document.getElementById('roomNum').textContent = roomNum;
    document.getElementById('deckCount').textContent = deck.length;
    document.getElementById('discardCount').textContent = discard.length;

    const wStack = document.getElementById('weaponStack');
    const wEmpty = document.getElementById('weaponEmptyNote');
    wStack.innerHTML = '';
    if(weapon){
      wEmpty.style.display='none';
      wStack.appendChild(cardEl(weapon, {tag:'WPN'}));
      weaponStack.forEach(m=>{
        wStack.appendChild(cardEl(m, {tag:'DEAD'}));
      });
    } else {
      wEmpty.style.display='inline-block';
    }

    const roomEl = document.getElementById('room');
    roomEl.innerHTML = '';
    room.forEach((card, idx)=>{
      const el = cardEl(card, {
        selected: selectedIdx===idx,
        disabled: gameOver,
        onClick: ()=>{ if(gameOver) return; selectedIdx = (selectedIdx===idx? null: idx); render(); }
      });
      roomEl.appendChild(el);
    });

    const actions = document.getElementById('actions');
    actions.innerHTML = '';
    if(gameOver){
      const p = document.createElement('p');
      p.className='hint';
      p.textContent = 'RUN ENDED. START A NEW GAME BELOW.';
      actions.appendChild(p);
    } else if(selectedIdx !== null && room[selectedIdx]){
      const card = room[selectedIdx];
      const type = SUITS[card.suit].type;
      if(type==='weapon'){
        actions.appendChild(mkBtn(`EQUIP ${rankLabel(card.value)}${SUITS[card.suit].symbol}`, ()=>resolveWeapon(selectedIdx), true));
      } else if(type==='potion'){
        const label = potionUsedThisRoom ? 'DRINK (NO EFFECT)' : `DRINK (+${card.value} HP)`;
        actions.appendChild(mkBtn(label, ()=>resolvePotion(selectedIdx), true));
      } else if(type==='monster'){
        actions.appendChild(mkBtn(`BAREHANDED (-${card.value} HP)`, ()=>resolveMonster(selectedIdx,false), false));
        if(canUseWeapon(card.value)){
          const dmg = Math.max(0, card.value - weapon.value);
          actions.appendChild(mkBtn(`USE WEAPON (-${dmg} HP)`, ()=>resolveMonster(selectedIdx,true), true));
        } else if(weapon){
          const b = mkBtn(`WEAPON TOO WORN`, null, false);
          b.disabled = true;
          actions.appendChild(b);
        }
      }
      actions.appendChild(mkBtn('CANCEL', ()=>{selectedIdx=null; render();}, false));
    } else {
      const canFlee = !fledLastRoom && !roomStarted && room.length>0;
      const fleeBtn = mkBtn('FLEE ROOM', fleeRoom, false);
      fleeBtn.classList.add('flee');
      fleeBtn.disabled = !canFlee;
      fleeBtn.title = fledLastRoom ? "CANNOT FLEE TWICE IN A ROW" : (roomStarted ? "TOO LATE TO FLEE" : '');
      actions.appendChild(fleeBtn);
      const hint = document.createElement('p');
      hint.className='hint';
      hint.textContent = 'SELECT A CARD TO FACE IT.';
      actions.appendChild(hint);
    }
  }

  function mkBtn(text, fn, primary){
    const b = document.createElement('button');
    b.textContent = text;
    if(primary) b.classList.add('primary');
    if(fn) b.addEventListener('click', fn);
    return b;
  }

  document.getElementById('restartBtn').addEventListener('click', ()=>{
    document.getElementById('overlay').classList.add('hidden');
    startGame();
  });
  document.getElementById('modalRestart').addEventListener('click', ()=>{
    document.getElementById('overlay').classList.add('hidden');
    startGame();
  });

  startGame();
})();
</script>
</body>
</html>
