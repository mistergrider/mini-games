<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>COUNTER // SOLO ENGINE</title>

<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="HP Tracker" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#050402" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#050402;
    --panel:#0c0906;
    --panel-2:#100c08;
    --amber:#ffb300;
    --amber-dim:#8a5f00;
    --amber-glow: rgba(255,179,0,0.55);
    --red:#ff5a4d;
    --red-dim:#7a2b24;
    --white:#e9e3d2;
    --ok:#8fffa0;
    --font-d:'VT323', monospace;
    --font-b:'Share Tech Mono','Courier New', monospace;
  }
  *{
    box-sizing:border-box;
    -webkit-tap-highlight-color: transparent;
    user-select:none;
    -webkit-user-select:none;
  }
  html,body{height:100%;margin:0;}
  body{
    background:radial-gradient(ellipse at 50% 0%, #0a0704 0%, var(--bg) 60%);
    color:var(--amber);
    font-family:var(--font-b);
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:18px;
    padding-top:calc(18px + env(safe-area-inset-top));
    padding-bottom:calc(18px + env(safe-area-inset-bottom));
    overscroll-behavior:none;
  }

  .crt::before{
    content:"";
    position:fixed; inset:0;
    background:repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 1px,
      rgba(0,0,0,0.18) 2px,
      rgba(0,0,0,0.18) 3px
    );
    pointer-events:none;
    z-index:50;
    mix-blend-mode:multiply;
    animation:flicker 6s infinite;
  }
  .crt::after{
    content:"";
    position:fixed; inset:0;
    background:radial-gradient(ellipse at center, rgba(0,0,0,0) 60%, rgba(0,0,0,0.55) 100%);
    pointer-events:none;
    z-index:51;
  }
  @keyframes flicker{
    0%,100%{opacity:1;}
    92%{opacity:1;}
    93%{opacity:0.85;}
    94%{opacity:1;}
  }

  .terminal{
    width:100%;
    max-width:420px;
    border:1px solid var(--amber-dim);
    background:var(--panel);
    box-shadow:0 0 40px rgba(255,179,0,0.08), inset 0 0 60px rgba(0,0,0,0.6);
    display:flex;
    flex-direction:column;
  }
  .titlebar{
    display:flex;
    align-items:center;
    gap:10px;
    padding:8px 14px;
    background:linear-gradient(180deg, #171006, #0c0805);
    border-bottom:1px solid var(--amber-dim);
    font-family:var(--font-d);
    font-size:20px;
    letter-spacing:2px;
    color:var(--amber);
  }
  .dots{display:flex;gap:6px; margin-left:auto;}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--amber-dim);}

  .screen{
    padding:26px 24px 24px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:28px;
  }

  .logo-wrap{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
  }
  .logo{
    font-family:'Press Start 2P', var(--font-d);
    font-size:22px;
    letter-spacing:3px;
    color:var(--amber);
    text-shadow:
      2px 2px 0 #7a4600,
      3px 3px 0 #7a4600,
      0 0 10px var(--amber-glow),
      0 0 22px var(--amber-glow);
    line-height:1.3;
  }
  .logo-sub{
    font-family:var(--font-b);
    font-size:11px;
    letter-spacing:4px;
    color:var(--amber-dim);
  }

  /* Mode switcher */
  .switcher{
    display:flex;
    width:100%;
    border:1px solid var(--amber-dim);
    background:var(--panel-2);
    padding:4px;
  }
  .switcher button{
    flex:1;
    padding:10px 0;
    border:none;
    background:transparent;
    color:var(--amber-dim);
    font-family:var(--font-b);
    font-size:13px;
    letter-spacing:2px;
    text-transform:uppercase;
    cursor:pointer;
    transition:background-color .12s, color .12s, box-shadow .12s;
  }
  .switcher button.active{
    background:var(--amber);
    color:#000;
    box-shadow:0 0 12px var(--amber-glow);
  }

  /* Card selector */
  .cards{
    display:none;
    align-items:center;
    gap:10px;
  }
  .cards.visible{ display:flex; }
  .card{
    width:60px;height:78px;
    border:1.5px solid var(--amber-dim);
    background:#000;
    color:var(--amber-dim);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:3px;
    cursor:pointer;
    font-family:var(--font-d);
    transition:transform .08s ease, border-color .08s ease, box-shadow .08s ease, color .08s ease;
  }
  .card:hover{ border-color:var(--amber); transform:translateY(-3px); }
  .card .label{ font-size:26px; line-height:1; }
  .card .val{ font-size:10px; letter-spacing:1px; text-transform:uppercase; font-family:var(--font-b); }
  .card.selected{
    border-color:var(--white);
    color:var(--white);
    box-shadow:0 0 10px var(--amber-glow);
    transform:translateY(-5px);
    background:#161005;
  }

  /* Display */
  .display{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
  }
  .hp{
    font-family:var(--font-d);
    font-size:92px;
    line-height:1;
    color:var(--white);
    text-shadow:0 0 14px rgba(233,227,210,0.25);
    font-variant-numeric: tabular-nums;
  }
  .hp.zero{ color:var(--red); text-shadow:0 0 14px rgba(255,90,77,0.4); }
  .sublabel{
    font-family:var(--font-b);
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:3px;
    color:var(--amber-dim);
  }

  /* Controls */
  .controls{
    display:flex;
    align-items:center;
    gap:18px;
  }
  .btn{
    display:flex;
    align-items:center;
    justify-content:center;
    border:none;
    cursor:pointer;
    font-family:var(--font-b);
  }
  .btn-minus, .btn-plus{
    width:72px;
    height:72px;
    border-radius:50%;
    font-size:30px;
    font-weight:400;
    transition:transform .1s, background-color .1s, box-shadow .1s, opacity .1s;
  }
  .btn-minus{
    background:#000;
    border:1px solid var(--amber);
    color:var(--amber);
  }
  .btn-minus:hover{ background:var(--amber); color:#000; box-shadow:0 0 12px var(--amber-glow); }
  .btn-plus{
    background:var(--amber);
    color:#000;
    box-shadow:0 0 12px var(--amber-glow);
  }
  .btn-plus:hover:not(:disabled){ box-shadow:0 0 18px var(--amber-glow); }
  .btn-plus:disabled{
    background:#000;
    border:1px solid var(--amber-dim);
    color:var(--amber-dim);
    box-shadow:none;
    cursor:not-allowed;
    opacity:.5;
  }
  .btn:active:not(:disabled){ transform:scale(0.95); }
  .btn-reset{
    width:44px;
    height:44px;
    border-radius:50%;
    background:transparent;
    border:1px solid var(--amber-dim);
    color:var(--amber-dim);
    transition:border-color .12s, color .12s;
  }
  .btn-reset:hover{ border-color:var(--amber); color:var(--amber); }
  .btn-reset svg{ width:18px; height:18px; }

  .footer-hint{
    font-size:10px;
    letter-spacing:2px;
    color:var(--amber-dim);
    text-align:center;
  }
</style>
</head>
<body class="crt">

<div class="terminal">
  <div class="titlebar">
    C:\APPS\COUNTER
    <div class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
  </div>

  <div class="screen">
    <div class="logo-wrap">
      <div class="logo">HP TRACKER</div>
      <div class="logo-sub">SOLO ENGINE // V1.0</div>
    </div>

    <div class="switcher">
      <button id="modeScoundrel" class="active">Scoundrel</button>
      <button id="modeRegicide">Regicide</button>
    </div>

    <div class="cards" id="cards">
      <button class="card selected" data-card="J" data-hp="20">
        <span class="label">J</span><span class="val">20 hp</span>
      </button>
      <button class="card" data-card="Q" data-hp="30">
        <span class="label">Q</span><span class="val">30 hp</span>
      </button>
      <button class="card" data-card="K" data-hp="40">
        <span class="label">K</span><span class="val">40 hp</span>
      </button>
    </div>

    <div class="display">
      <span class="hp" id="hpValue">20</span>
      <span class="sublabel" id="subLabel">HP &middot; MAX 20</span>
    </div>

    <div class="controls">
      <button class="btn btn-minus" id="decBtn" aria-label="Decrease by one">&minus;</button>
      <button class="btn btn-reset" id="resetBtn" aria-label="Reset">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
      </button>
      <button class="btn btn-plus" id="incBtn" aria-label="Increase by one">&plus;</button>
    </div>

    <div class="footer-hint">TAP A CARD TO SET THE TARGET, THEN TRACK DAMAGE</div>
  </div>
</div>

<script>
  const CARDS = { J: 20, Q: 30, K: 40 };
  const SCOUNDREL_MAX = 20;
  const SCOUNDREL_START = 20;

  let mode = "scoundrel";
  let scoundrelHP = SCOUNDREL_START;
  let card = "J";
  let regicideHP = CARDS.J;

  const hpValue = document.getElementById("hpValue");
  const subLabel = document.getElementById("subLabel");
  const modeScoundrel = document.getElementById("modeScoundrel");
  const modeRegicide = document.getElementById("modeRegicide");
  const cardsEl = document.getElementById("cards");
  const decBtn = document.getElementById("decBtn");
  const incBtn = document.getElementById("incBtn");
  const resetBtn = document.getElementById("resetBtn");

  function render() {
    const isScoundrel = mode === "scoundrel";
    const hp = isScoundrel ? scoundrelHP : regicideHP;

    hpValue.textContent = hp;
    hpValue.classList.toggle("zero", hp <= 0);

    subLabel.textContent = isScoundrel
      ? `HP \u00b7 MAX ${SCOUNDREL_MAX}`
      : `${card} \u00b7 ${CARDS[card]} HP \u00b7 DAMAGE ONLY`;

    modeScoundrel.classList.toggle("active", isScoundrel);
    modeRegicide.classList.toggle("active", !isScoundrel);
    cardsEl.classList.toggle("visible", !isScoundrel);

    incBtn.disabled = !isScoundrel;

    document.querySelectorAll(".card").forEach((el) => {
      el.classList.toggle("selected", el.dataset.card === card);
    });
  }

  modeScoundrel.addEventListener("click", () => { mode = "scoundrel"; render(); });
  modeRegicide.addEventListener("click", () => { mode = "regicide"; render(); });

  cardsEl.addEventListener("click", (e) => {
    const btn = e.target.closest(".card");
    if (!btn) return;
    card = btn.dataset.card;
    regicideHP = CARDS[card];
    render();
  });

  decBtn.addEventListener("click", () => {
    if (mode === "scoundrel") scoundrelHP -= 1;
    else regicideHP -= 1;
    render();
  });

  incBtn.addEventListener("click", () => {
    if (mode === "scoundrel") scoundrelHP = Math.min(SCOUNDREL_MAX, scoundrelHP + 1);
    render();
  });

  resetBtn.addEventListener("click", () => {
    if (mode === "scoundrel") scoundrelHP = SCOUNDREL_START;
    else regicideHP = CARDS[card];
    render();
  });

  render();
</script>

</body>
</html>
