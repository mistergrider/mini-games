<style>
  :root {
    color-scheme: dark;
  }
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }
  html, body {
    height: 100%;
    margin: 0;
    background: #0a0a0a;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Helvetica, Arial, sans-serif;
    overscroll-behavior: none;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    padding-top: calc(24px + env(safe-area-inset-top));
    padding-bottom: calc(24px + env(safe-area-inset-bottom));
  }
  .app {
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  /* Mode switcher */
  .switcher {
    display: flex;
    width: 100%;
    background: #171717;
    border: 1px solid #262626;
    border-radius: 999px;
    padding: 4px;
  }
  .switcher button {
    flex: 1;
    padding: 10px 0;
    border: none;
    background: transparent;
    color: #737373;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.02em;
    border-radius: 999px;
    transition: background-color 0.15s, color 0.15s;
  }
  .switcher button.active {
    background: #ea580c;
    color: white;
  }

  /* Card selector */
  .cards {
    display: none;
    align-items: center;
    gap: 12px;
  }
  .cards.visible {
    display: flex;
  }
  .card {
    width: 64px;
    height: 80px;
    border-radius: 14px;
    border: 1px solid #262626;
    background: transparent;
    color: #737373;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    transition: border-color 0.15s, color 0.15s, background-color 0.15s;
  }
  .card .label { font-size: 24px; font-weight: 700; }
  .card .val { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; }
  .card.selected {
    border-color: #ea580c;
    background: rgba(234, 88, 12, 0.1);
    color: white;
  }

  /* Display */
  .display {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .hp {
    font-size: 96px;
    font-weight: 700;
    color: white;
    letter-spacing: -0.02em;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .hp.zero { color: #ef4444; }
  .sublabel {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: #737373;
  }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    cursor: pointer;
  }
  .btn-minus, .btn-plus {
    width: 80px;
    height: 80px;
    border-radius: 999px;
    font-size: 34px;
    font-weight: 300;
    transition: transform 0.1s, background-color 0.15s, opacity 0.15s;
  }
  .btn-minus {
    background: #171717;
    border: 1px solid #262626;
    color: white;
  }
  .btn-plus {
    background: #ea580c;
    color: white;
  }
  .btn-plus:disabled {
    background: #171717;
    border: 1px solid #262626;
    color: #404040;
    cursor: not-allowed;
  }
  .btn:active:not(:disabled) {
    transform: scale(0.95);
  }
  .btn-reset {
    width: 48px;
    height: 48px;
    border-radius: 999px;
    background: transparent;
    color: #737373;
  }
  .btn-reset svg { width: 20px; height: 20px; }
</style>
</head>
<body>

<div class="app">
  <div class="switcher">
    <button id="modeScoundrel" class="active">Scoundrel</button>
    <button id="modeRegicide">Regicide</button>
  </div>

  <div class="cards" id="cards">
    <button class="card selected" data-card="J" data-hp="20">
      <span class="label">J</span><span class="val">20 hp</span>
    </button>
    <button class="card" data-card="Q" data-hp="30">
      <span class="label">Q</span><span class="val">30 hp</span>
    </button>
    <button class="card" data-card="K" data-hp="40">
      <span class="label">K</span><span class="val">40 hp</span>
    </button>
  </div>

  <div class="display">
    <span class="hp" id="hpValue">20</span>
    <span class="sublabel" id="subLabel">hp &middot; max 20</span>
  </div>

  <div class="controls">
    <button class="btn btn-minus" id="decBtn" aria-label="Decrease by one">&minus;</button>
    <button class="btn btn-reset" id="resetBtn" aria-label="Reset">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
    </button>
    <button class="btn btn-plus" id="incBtn" aria-label="Increase by one">&plus;</button>
  </div>
</div>

<script>
  const CARDS = { J: 20, Q: 30, K: 40 };
  const SCOUNDREL_MAX = 20;
  const SCOUNDREL_START = 20;

  let mode = "scoundrel";
  let scoundrelHP = SCOUNDREL_START;
  let card = "J";
  let regicideHP = CARDS.J;

  const hpValue = document.getElementById("hpValue");
  const subLabel = document.getElementById("subLabel");
  const modeScoundrel = document.getElementById("modeScoundrel");
  const modeRegicide = document.getElementById("modeRegicide");
  const cardsEl = document.getElementById("cards");
  const decBtn = document.getElementById("decBtn");
  const incBtn = document.getElementById("incBtn");
  const resetBtn = document.getElementById("resetBtn");

  function render() {
    const isScoundrel = mode === "scoundrel";
    const hp = isScoundrel ? scoundrelHP : regicideHP;

    hpValue.textContent = hp;
    hpValue.classList.toggle("zero", hp <= 0);

    subLabel.textContent = isScoundrel
      ? `hp \u00b7 max ${SCOUNDREL_MAX}`
      : `${card} \u00b7 ${CARDS[card]} hp \u00b7 damage only`;

    modeScoundrel.classList.toggle("active", isScoundrel);
    modeRegicide.classList.toggle("active", !isScoundrel);
    cardsEl.classList.toggle("visible", !isScoundrel);

    incBtn.disabled = !isScoundrel;

    document.querySelectorAll(".card").forEach((el) => {
      el.classList.toggle("selected", el.dataset.card === card);
    });
  }

  modeScoundrel.addEventListener("click", () => { mode = "scoundrel"; render(); });
  modeRegicide.addEventListener("click", () => { mode = "regicide"; render(); });

  cardsEl.addEventListener("click", (e) => {
    const btn = e.target.closest(".card");
    if (!btn) return;
    card = btn.dataset.card;
    regicideHP = CARDS[card];
    render();
  });

  decBtn.addEventListener("click", () => {
    if (mode === "scoundrel") scoundrelHP -= 1;
    else regicideHP -= 1;
    render();
  });

  incBtn.addEventListener("click", () => {
    if (mode === "scoundrel") scoundrelHP = Math.min(SCOUNDREL_MAX, scoundrelHP + 1);
    render();
  });

  resetBtn.addEventListener("click", () => {
    if (mode === "scoundrel") scoundrelHP = SCOUNDREL_START;
    else regicideHP = CARDS[card];
    render();
  });

  render();
</script>

</body>
</html>
